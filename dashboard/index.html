<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMEON - Climate Risk Intelligence Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        /* Header */
        .header {
            background: #1e293b;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #38bdf8;
        }
        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }
        .status-dot.error { background: #ef4444; }

        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 320px 1fr 420px;
            height: calc(100vh - 57px);
        }

        /* Sidebar */
        .sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 16px;
        }
        .sidebar h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 12px;
        }

        /* Region Card */
        .region-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .region-card:hover, .region-card.active {
            border-color: #38bdf8;
        }
        .region-card .name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .region-card .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
        }

        /* Risk Badge */
        .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .risk-CRITICAL { background: #991b1b; color: #fecaca; }
        .risk-HIGH { background: #9a3412; color: #fed7aa; }
        .risk-MEDIUM { background: #854d0e; color: #fef08a; }
        .risk-LOW { background: #166534; color: #bbf7d0; }
        .risk-UNKNOWN { background: #374151; color: #9ca3af; }

        /* Map */
        #map {
            width: 100%;
            height: 100%;
        }

        /* Right Panel */
        .panel {
            background: #1e293b;
            border-left: 1px solid #334155;
            overflow-y: auto;
            padding: 16px;
        }
        .panel h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 12px;
        }

        /* Detail Section */
        .detail-section {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .detail-section h3 {
            font-size: 13px;
            color: #38bdf8;
            margin-bottom: 10px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid #1e293b;
        }
        .detail-row .label { color: #94a3b8; }
        .detail-row .value { color: #e2e8f0; font-weight: 500; }

        /* Chart Container */
        .chart-container {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .chart-container h3 {
            font-size: 13px;
            color: #38bdf8;
            margin-bottom: 10px;
        }
        canvas { width: 100% !important; }

        /* Timeline */
        .timeline-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 12px;
        }
        .timeline-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }
        .timeline-time { color: #64748b; font-size: 11px; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-state h3 { color: #94a3b8; margin-bottom: 8px; }

        /* === NEW: Analyze Button === */
        .analyze-btn {
            width: 100%;
            padding: 10px 16px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .analyze-btn:hover { opacity: 0.9; }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        /* === NEW: Comparison Grid === */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .comparison-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .comparison-card h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 8px;
        }
        .comparison-card .risk-badge {
            font-size: 14px;
            padding: 4px 12px;
        }
        .comparison-card .metric {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
        }
        .comparison-card .metric b { color: #e2e8f0; }

        /* Agreement Badge */
        .agreement-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 8px 0;
        }
        .agreement-match {
            background: #166534;
            color: #bbf7d0;
        }
        .agreement-close {
            background: #854d0e;
            color: #fef08a;
        }
        .agreement-differ {
            background: #991b1b;
            color: #fecaca;
        }

        /* Reason Item */
        .reason-item {
            background: #1e293b;
            border-left: 3px solid #38bdf8;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            font-size: 12px;
            line-height: 1.5;
            color: #cbd5e1;
        }
        .reason-item.differ {
            border-left-color: #f59e0b;
        }

        /* Independence Box */
        .independence-box {
            background: #0c1222;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .independence-box h3 {
            font-size: 13px;
            color: #60a5fa;
            margin-bottom: 10px;
        }
        .proof-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid #1e293b;
        }
        .proof-item:last-child { border-bottom: none; }
        .proof-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .proof-tag.input { background: #166534; color: #bbf7d0; }
        .proof-tag.blocked { background: #991b1b; color: #fecaca; }
        .proof-tag.info { background: #1e3a5f; color: #93c5fd; }

        /* Feature Bar */
        .feature-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 11px;
        }
        .feature-bar-name {
            width: 110px;
            color: #94a3b8;
            text-align: right;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .feature-bar-track {
            flex: 1;
            height: 14px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }
        .feature-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .feature-bar-value {
            width: 45px;
            color: #e2e8f0;
            font-weight: 500;
            flex-shrink: 0;
        }

        /* Collapsible */
        .collapsible-toggle {
            background: none;
            border: none;
            color: #60a5fa;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 0;
            text-decoration: underline;
        }
        .collapsible-content {
            display: none;
            margin-top: 8px;
        }
        .collapsible-content.open {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>COSMEON Climate Risk Intelligence</h1>
        <div class="status">
            <div class="status-dot" id="apiStatus"></div>
            <span id="apiStatusText">Connecting...</span>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main">
        <!-- Left Sidebar: Regions -->
        <div class="sidebar">
            <h2>Monitored Regions</h2>
            <div id="regionList">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading regions...
                </div>
            </div>
        </div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Right Panel: Details -->
        <div class="panel">
            <h2>Risk Assessment</h2>
            <div id="detailPanel">
                <div class="empty-state">
                    <h3>No Region Selected</h3>
                    <p>Select a region from the sidebar to view details</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let map, regionLayers = {};
        let historyChart = null;
        let driversChart = null;
        let selectedRegionId = null;

        // --- Map Setup ---
        function initMap() {
            map = L.map('map').setView([26.0, 85.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        }

        // --- API Calls ---
        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error(`API error (${endpoint}):`, err);
                return null;
            }
        }

        // --- Check API Health ---
        async function checkHealth() {
            const data = await fetchAPI('/health');
            const dot = document.getElementById('apiStatus');
            const text = document.getElementById('apiStatusText');
            if (data && data.status === 'healthy') {
                dot.className = 'status-dot';
                text.textContent = 'API Connected';
            } else {
                dot.className = 'status-dot error';
                text.textContent = 'API Offline';
            }
        }

        // --- Load Regions ---
        async function loadRegions() {
            const data = await fetchAPI('/regions');
            const container = document.getElementById('regionList');

            if (!data || data.count === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No Regions</h3>
                        <p>Run the pipeline first to add monitored regions</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            for (const region of data.regions) {
                const risk = await fetchAPI(`/regions/${region.id}/risk`);
                const card = createRegionCard(region, risk);
                container.appendChild(card);
                addRegionToMap(region, risk);
            }
        }

        // --- Create Region Card ---
        function createRegionCard(region, risk) {
            const card = document.createElement('div');
            card.className = 'region-card';
            card.onclick = () => selectRegion(region.id, card);

            const riskLevel = risk?.risk_level || 'UNKNOWN';
            const floodPct = risk?.flood_percentage ? (risk.flood_percentage * 100).toFixed(1) : '--';
            const confidence = risk?.confidence_score ? risk.confidence_score.toFixed(3) : '--';

            card.innerHTML = `
                <div class="name">${region.name}</div>
                <div style="margin-bottom: 8px;">
                    <span class="risk-badge risk-${riskLevel}">${riskLevel}</span>
                </div>
                <div class="stats">
                    <div><span class="label">Flood: </span>${floodPct}%</div>
                    <div><span class="label">Confidence: </span>${confidence}</div>
                    <div><span class="label">Area: </span>${risk?.flood_area_km2?.toFixed(1) || '--'} km2</div>
                    <div><span class="label">Change: </span>${risk?.change_type || '--'}</div>
                </div>`;
            return card;
        }

        // --- Add Region to Map ---
        function addRegionToMap(region, risk) {
            if (!region.bbox) return;
            const [west, south, east, north] = region.bbox;
            const bounds = [[south, west], [north, east]];

            const colors = {
                CRITICAL: '#dc2626', HIGH: '#ea580c',
                MEDIUM: '#ca8a04', LOW: '#16a34a', UNKNOWN: '#6b7280'
            };
            const riskLevel = risk?.risk_level || 'UNKNOWN';

            const rect = L.rectangle(bounds, {
                color: colors[riskLevel],
                weight: 2,
                fillOpacity: 0.2,
                fillColor: colors[riskLevel],
            }).addTo(map);

            rect.bindPopup(`
                <b>${region.name}</b><br>
                Risk: <b>${riskLevel}</b><br>
                Flood: ${risk?.flood_percentage ? (risk.flood_percentage * 100).toFixed(1) + '%' : 'N/A'}
            `);

            regionLayers[region.id] = { rect, bounds };
        }

        // --- Select Region ---
        async function selectRegion(regionId, cardEl) {
            selectedRegionId = regionId;
            document.querySelectorAll('.region-card').forEach(c => c.classList.remove('active'));
            if (cardEl) cardEl.classList.add('active');

            if (regionLayers[regionId]) {
                map.fitBounds(regionLayers[regionId].bounds, { padding: [50, 50] });
            }

            const panel = document.getElementById('detailPanel');
            panel.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

            const [report, changes] = await Promise.all([
                fetchAPI(`/reports/${regionId}`),
                fetchAPI(`/changes?region_id=${regionId}&limit=10`),
            ]);

            if (!report) {
                panel.innerHTML = '<div class="empty-state"><h3>Error loading data</h3></div>';
                return;
            }

            renderDetails(report, changes, regionId);
        }

        // --- Render Detail Panel ---
        function renderDetails(report, changes, regionId) {
            const panel = document.getElementById('detailPanel');
            const latest = report.latest_assessment;
            const region = report.region;

            let html = '';

            // Current Status
            if (latest) {
                html += `
                    <div class="detail-section">
                        <h3>Current Status</h3>
                        <div style="text-align: center; margin-bottom: 10px;">
                            <span class="risk-badge risk-${latest.risk_level}" style="font-size: 16px; padding: 6px 16px;">
                                ${latest.risk_level} RISK
                            </span>
                        </div>
                        <div class="detail-row"><span class="label">Flood Coverage</span><span class="value">${(latest.flood_percentage * 100).toFixed(2)}%</span></div>
                        <div class="detail-row"><span class="label">Flood Area</span><span class="value">${latest.flood_area_km2?.toFixed(2)} km2</span></div>
                        <div class="detail-row"><span class="label">Total Area</span><span class="value">${latest.total_area_km2?.toFixed(2)} km2</span></div>
                        <div class="detail-row"><span class="label">Confidence</span><span class="value">${latest.confidence_score?.toFixed(3)}</span></div>
                        <div class="detail-row"><span class="label">Change Type</span><span class="value">${latest.change_type || '--'}</span></div>
                        <div class="detail-row"><span class="label">Water Change</span><span class="value">${latest.water_change_pct ? (latest.water_change_pct * 100).toFixed(2) + '%' : '--'}</span></div>
                        <div class="detail-row"><span class="label">Assessed</span><span class="value">${formatDate(latest.processed_at)}</span></div>
                    </div>`;
            }

            // ANALYZE PREDICTION BUTTON
            html += `<button class="analyze-btn" id="analyzeBtn" onclick="loadExplanation(${regionId})">Analyze ML Prediction vs GloFAS</button>`;

            // Placeholder for explanation content
            html += `<div id="explanationPanel"></div>`;

            // Risk History Chart
            if (report.risk_history && report.risk_history.length > 1) {
                html += `
                    <div class="chart-container">
                        <h3>Flood Coverage Over Time</h3>
                        <canvas id="historyChart" height="160"></canvas>
                    </div>`;
            }

            // Change Events Timeline
            if (changes && changes.events && changes.events.length > 0) {
                html += `<div class="detail-section"><h3>Change Events</h3>`;
                for (const evt of changes.events) {
                    const dotColor = evt.change_type === 'flood_increase' ? '#dc2626' :
                                     evt.change_type === 'flood_decrease' ? '#16a34a' : '#6b7280';
                    html += `
                        <div class="timeline-item">
                            <div class="timeline-dot" style="background: ${dotColor}"></div>
                            <div>
                                <div>${evt.change_type?.replace('_', ' ')}</div>
                                <div class="timeline-time">${formatDate(evt.current_date)}</div>
                                <div style="color: #94a3b8">Water change: ${(evt.water_change_pct * 100).toFixed(2)}% | Area: ${evt.area_change_km2?.toFixed(2)} km2</div>
                            </div>
                        </div>`;
                }
                html += '</div>';
            }

            // Region Info
            html += `
                <div class="detail-section">
                    <h3>Region Info</h3>
                    <div class="detail-row"><span class="label">Region ID</span><span class="value">${region.id}</span></div>
                    <div class="detail-row"><span class="label">Name</span><span class="value">${region.name}</span></div>
                    <div class="detail-row"><span class="label">BBox</span><span class="value" style="font-size: 11px">${region.bbox?.join(', ')}</span></div>
                    <div class="detail-row"><span class="label">Total Assessments</span><span class="value">${report.summary.total_assessments}</span></div>
                </div>`;

            panel.innerHTML = html;

            if (report.risk_history && report.risk_history.length > 1) {
                setTimeout(() => renderHistoryChart(report.risk_history), 100);
            }
        }

        // =============================================
        //  EXPLAINABILITY: Load & Render
        // =============================================

        async function loadExplanation(regionId) {
            const btn = document.getElementById('analyzeBtn');
            const panel = document.getElementById('explanationPanel');

            btn.disabled = true;
            btn.textContent = 'Analyzing... (fetching live data)';
            panel.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching ML prediction and GloFAS data...</div>';

            const data = await fetchAPI(`/explain/${regionId}`);

            btn.disabled = false;
            btn.textContent = 'Analyze ML Prediction vs GloFAS';

            if (!data) {
                panel.innerHTML = '<div class="detail-section"><h3>Error</h3><p style="color:#ef4444">Could not fetch explanation data. Check API connection.</p></div>';
                return;
            }

            renderExplanation(data);
        }

        function renderExplanation(data) {
            const panel = document.getElementById('explanationPanel');
            const ml = data.ml_prediction;
            const gf = data.glofas_assessment;
            const comp = data.comparison;
            const proof = data.independence_proof;

            let html = '';

            // --- 1. SIDE-BY-SIDE COMPARISON ---
            html += `<div class="detail-section">
                <h3>ML Prediction vs GloFAS Comparison</h3>
                <div class="comparison-grid">
                    <div class="comparison-card" style="border-color: #6366f1">
                        <h4>Our ML Model</h4>
                        <span class="risk-badge risk-${ml.risk_level}">${ml.risk_level}</span>
                        <div class="metric">Probability: <b>${(ml.probability * 100).toFixed(1)}%</b></div>
                        <div class="metric">Confidence: <b>${(ml.confidence * 100).toFixed(1)}%</b></div>
                        <div class="metric" style="margin-top:4px;font-size:10px;color:#818cf8">Input: Weather + Terrain</div>
                    </div>
                    <div class="comparison-card" style="border-color: #0ea5e9">
                        <h4>GloFAS Ground Truth</h4>
                        <span class="risk-badge risk-${gf.risk_level}">${gf.risk_level}</span>
                        <div class="metric">Discharge: <b>${gf.discharge_m3s} m3/s</b></div>
                        <div class="metric">Anomaly: <b>${gf.anomaly_sigma > 0 ? '+' : ''}${gf.anomaly_sigma} sigma</b></div>
                        <div class="metric" style="margin-top:4px;font-size:10px;color:#38bdf8">Input: River Discharge</div>
                    </div>
                </div>`;

            // Agreement badge
            let badgeClass, badgeText;
            if (comp.agreement && comp.agreement_score >= 0.9) {
                badgeClass = 'agreement-match';
                badgeText = 'MATCH - Both agree';
            } else if (comp.agreement) {
                badgeClass = 'agreement-close';
                badgeText = 'CLOSE - Within 1 level';
            } else {
                badgeClass = 'agreement-differ';
                badgeText = 'DIFFERS - See reasons below';
            }
            html += `<div style="text-align:center">
                <span class="agreement-badge ${badgeClass}">${badgeText}</span>
                <div style="font-size:11px;color:#64748b;margin-top:4px">Agreement Score: ${(comp.agreement_score * 100).toFixed(0)}%</div>
            </div></div>`;

            // --- 2. WHY THEY AGREE/DIFFER ---
            const diffTitle = comp.agreement && comp.agreement_score >= 0.9
                ? 'Why Both Sources Agree'
                : 'Why Predictions Differ';
            const reasonClass = comp.agreement && comp.agreement_score >= 0.9 ? '' : 'differ';

            html += `<div class="detail-section">
                <h3>${diffTitle}</h3>
                <p style="font-size:12px;color:#94a3b8;margin-bottom:10px">${comp.summary}</p>`;

            for (const reason of comp.difference_reasons) {
                html += `<div class="reason-item ${reasonClass}">${reason}</div>`;
            }
            html += `</div>`;

            // --- 3. ML EXPLANATION ---
            html += `<div class="detail-section">
                <h3>ML Model Explanation</h3>
                <p style="font-size:12px;color:#cbd5e1;line-height:1.5;margin-bottom:10px">${ml.explanation}</p>
            </div>`;

            // --- 4. TOP CONTRIBUTING FACTORS ---
            html += `<div class="chart-container">
                <h3>Top Contributing Factors (Feature Importance)</h3>`;

            const topDrivers = ml.top_drivers || [];
            for (const d of topDrivers) {
                const pct = (d.importance * 100).toFixed(1);
                const barColor = d.importance > 0.15 ? '#f59e0b' : d.importance > 0.08 ? '#38bdf8' : '#64748b';
                html += `<div class="feature-bar-row">
                    <div class="feature-bar-name" title="${d.feature}">${formatFeatureName(d.feature)}</div>
                    <div class="feature-bar-track">
                        <div class="feature-bar-fill" style="width:${Math.min(d.importance * 400, 100)}%;background:${barColor}"></div>
                    </div>
                    <div class="feature-bar-value">${pct}%</div>
                </div>
                <div style="font-size:10px;color:#64748b;margin-left:118px;margin-bottom:4px">${d.influence}</div>`;
            }
            html += `</div>`;

            // --- 5. GloFAS EXPLANATION ---
            html += `<div class="detail-section">
                <h3>GloFAS Assessment Details</h3>
                <p style="font-size:12px;color:#cbd5e1;line-height:1.5;margin-bottom:10px">${gf.explanation}</p>
                <div class="detail-row"><span class="label">Current Discharge</span><span class="value">${gf.discharge_m3s} m3/s</span></div>
                <div class="detail-row"><span class="label">Mean Discharge</span><span class="value">${gf.mean_discharge_m3s} m3/s</span></div>
                <div class="detail-row"><span class="label">Anomaly</span><span class="value">${gf.anomaly_sigma > 0 ? '+' : ''}${gf.anomaly_sigma} sigma</span></div>
            </div>`;

            // --- 6. MODEL INDEPENDENCE PROOF ---
            html += `<div class="independence-box">
                <h3>Model Independence Proof</h3>
                <p style="font-size:11px;color:#94a3b8;margin-bottom:10px">
                    This section proves the ML model predicts independently and does NOT copy GloFAS results.
                </p>

                <div class="proof-item">
                    <span class="proof-tag input">USES</span>
                    <span style="color:#cbd5e1">${proof.model_uses}</span>
                </div>
                <div class="proof-item">
                    <span class="proof-tag blocked">NO</span>
                    <span style="color:#cbd5e1">${proof.model_does_not_use}</span>
                </div>
                <div class="proof-item">
                    <span class="proof-tag info">GLOFAS</span>
                    <span style="color:#cbd5e1">${proof.glofas_uses}</span>
                </div>
                <div class="proof-item">
                    <span class="proof-tag info">TRAIN</span>
                    <span style="color:#cbd5e1">${proof.how_training_works}</span>
                </div>
                <div class="proof-item">
                    <span class="proof-tag input">VERIFY</span>
                    <span style="color:#cbd5e1">${proof.verification}</span>
                </div>`;

            // Feature data sources
            html += `<button class="collapsible-toggle" onclick="toggleCollapsible('featureSources')">Show Feature Data Sources</button>
                <div class="collapsible-content" id="featureSources">`;
            if (proof.feature_data_sources) {
                for (const [source, features] of Object.entries(proof.feature_data_sources)) {
                    html += `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid #1e293b">
                        <span style="color:#60a5fa">${source}:</span>
                        <span style="color:#94a3b8"> ${features.join(', ')}</span>
                    </div>`;
                }
            }
            html += `</div></div>`;

            // --- 7. METHODOLOGY COMPARISON ---
            html += `<div class="detail-section">
                <h3>Methodology Comparison</h3>
                <div style="font-size:12px;margin-bottom:8px">
                    <b style="color:#818cf8">Our ML Model:</b>
                    <p style="color:#94a3b8;margin-top:4px">${comp.our_methodology}</p>
                </div>
                <div style="font-size:12px">
                    <b style="color:#38bdf8">GloFAS System:</b>
                    <p style="color:#94a3b8;margin-top:4px">${comp.glofas_methodology}</p>
                </div>
            </div>`;

            panel.innerHTML = html;
        }

        function formatFeatureName(name) {
            const map = {
                'precip_30d': 'Precip 30d',
                'precip_7d': 'Precip 7d',
                'precip_anomaly': 'Precip Anomaly',
                'max_daily_rain_7d': 'Max Daily Rain',
                'soil_moisture': 'Soil Moisture',
                'temperature': 'Temperature',
                'elevation_m': 'Elevation',
                'month': 'Season/Month',
                'trend': 'Flood Trend',
                'mean_flood_pct': 'Avg Flood %',
                'max_flood_pct': 'Max Flood %',
                'rainfall_mm': 'Rainfall',
                'risk_multiplier': 'Risk Mult.',
            };
            return map[name] || name;
        }

        function toggleCollapsible(id) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
        }

        // --- History Chart ---
        function renderHistoryChart(history) {
            const canvas = document.getElementById('historyChart');
            if (!canvas) return;

            if (historyChart) historyChart.destroy();

            const labels = history.map(h => formatDate(h.timestamp)).reverse();
            const data = history.map(h => (h.flood_percentage * 100).toFixed(2)).reverse();
            const confidence = history.map(h => (h.confidence_score * 100).toFixed(1)).reverse();

            historyChart = new Chart(canvas, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Flood %',
                            data,
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            fill: true,
                            tension: 0.3,
                        },
                        {
                            label: 'Confidence %',
                            data: confidence,
                            borderColor: '#a78bfa',
                            borderDash: [5, 5],
                            tension: 0.3,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
                    scales: {
                        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' } },
                        y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                    },
                },
            });
        }

        // --- Utility ---
        function formatDate(dateStr) {
            if (!dateStr) return '--';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // --- Init ---
        initMap();
        checkHealth();
        loadRegions();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
